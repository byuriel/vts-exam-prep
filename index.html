<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VTS Prep">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>VTS Anesthesia Exam Prep</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0c0a14; --panel:#12101e; --card:#1a1728; --card2:#0e0c18;
    --border:#2a2440; --violet:#7c3aed; --violet2:#a855f7; --violetMid:#2D1F5E;
    --violetSoft:rgba(124,58,237,0.12); --teal:#0ea5e9; --green:#10b981;
    --greenSoft:rgba(16,185,129,0.12); --amber:#f59e0b; --amberSoft:rgba(245,158,11,0.12);
    --red:#ef4444; --redSoft:rgba(239,68,68,0.12);
    --text:#f0edf7; --sub:#c4bdd6; --muted:#8b82a3;
  }
  html,body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  body { min-height:100vh; min-height:100dvh; }
  #root { max-width:520px; margin:0 auto; min-height:100vh; min-height:100dvh; position:relative; }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  ::-webkit-scrollbar { width:0; height:0; }

  /* Safe area for iPhone notch */
  .safe-top { padding-top:env(safe-area-inset-top); }
  .safe-bottom { padding-bottom:env(safe-area-inset-bottom); }

  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop { 0%{transform:scale(0.96)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  .fadeUp { animation:fadeUp 0.4s ease both; }
  .slideIn { animation:slideIn 0.3s ease both; }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
